<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — WeighSmart</title>
{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <span class="logo-icon">⚖️</span> WeighSmart
  </div>
  <p style="color:var(--text-muted);font-size:14px;margin-bottom:28px;">Your smart health companion</p>

  {% for message in messages %}
  <div class="alert alert-{{ message.tags|default:'info' }} mb-3">{{ message }}</div>
  {% endfor %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" required>
    </div>
    {% if form.errors %}
    <div class="alert alert-danger mb-3">Invalid username or password. Please try again.</div>
    {% endif %}
    <button type="submit" class="btn btn-primary w-100 py-2" style="font-size:15px;">Sign In 🚀</button>
  </form>

  <p class="text-center mt-4" style="font-size:14px;color:var(--text-muted);">
    Don't have an account? <a href="{% url 'register' %}" style="color:var(--primary);font-weight:600;">Create one free</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
