services:
  - type: web
    name: weighsmart
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn weighsmart.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "weighsmart.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://weighsmart.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weighsmart-db
          property: connectionString

databases:
  - name: weighsmart-db
    plan: free
